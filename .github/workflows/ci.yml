name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    # The support target: Python ≥ 3.11 on Linux, macOS, and Windows (the wheel
    # is pure Python — one build covers all three; these runners prove it).
    # Full Python spread on Linux; the version boundaries (oldest + newest) on
    # macOS/Windows, where breakage is OS-shaped, not version-shaped.
    name: ${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'macos' || 'windows' }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          - { os: macos-latest, python: "3.12" }
          - { os: macos-latest, python: "3.13" }
          - { os: windows-latest, python: "3.12" }
          - { os: windows-latest, python: "3.13" }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install (stdlib-only engine + dev tooling)
        run: pip install -e ".[dev]" uv

      - name: Unit suite
        run: pytest -q tests

      - name: End-to-end suite (real CLI + fixture corpus + goldens + eval gate)
        run: pytest -q tests_e2e

  build-check:
    # Metadata validation BEFORE a release ever happens — twine check catches
    # the class of bugs PyPI only reveals after publishing (README rendering,
    # bad classifiers). The publish workflow re-checks; this fails PRs early.
    name: Build & metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist + wheel
        run: pip install build && python -m build

      - name: Validate distribution metadata
        run: pip install twine && twine check --strict dist/*

      - name: sdist must not ship the archived old build
        run: |
          python - <<'PY'
          import glob, sys, tarfile
          sdist = glob.glob("dist/*.tar.gz")[0]
          # top-level archive/ is the old non-working build; docs/archive/ is fine
          bad = [n for n in tarfile.open(sdist).getnames()
                 if n.split("/")[1:2] in (["archive"], ["uv.lock"], [".github"])]
          if bad:
              print("✗ sdist ships excluded paths:", *bad[:5], sep="\n  ")
              sys.exit(1)
          print("✔ sdist clean")
          PY

  gate:
    # The merge gate. This job's check context ("fux gate" — the bare job name)
    # is a REQUIRED status check on the protected branch — see
    # .github/branch-protection.json. It is a strict aggregator: green only when
    # the full OS×Python matrix AND the packaging check are green, so the wall
    # transitively requires every supported platform. `if: always()` + explicit
    # result checks matter: a skipped required check would count as satisfied.
    name: fux gate
    runs-on: ubuntu-latest
    needs: [test, build-check]
    if: always()

    steps:
      - name: All required jobs must have succeeded
        run: |
          echo "test:        ${{ needs.test.result }}"
          echo "build-check: ${{ needs.build-check.result }}"
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "✗ gate: a required job did not succeed" >&2
            exit 1
          fi
          echo "✔ gate green — matrix + packaging all succeeded"

  ai-review:
    # The second-set-of-eyes review. A solo author can't approve his own PR, so
    # the missing human approval is enforced as a CHECK: a separate reviewer
    # identity runs the deterministic probes and REFUSES (exit 3) if
    # reviewer == PR author (separation of duties). Model-free by law
    # (CLAUDE.md). The suites are NOT re-run here — they're deterministic and
    # already required via the gate; this job's value is its distinct probes.
    name: ai-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need base sha to diff the PR

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deterministic review of the PR (separation of duties enforced)
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REVIEWER: fux-ci-reviewer
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: ./scripts/ai-review.sh
