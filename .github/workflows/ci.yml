name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install (stdlib-only engine + pytest)
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest -q

      - name: Self-check (dogfood — engine must init/build/check its own project)
        run: |
          fux --version
          fux setup
          mkdir -p /tmp/selfcheck && cd /tmp/selfcheck && git init -q
          fux init
          fux new formula sample --domain demo
          fux build
          fux check

  build-check:
    name: Build & metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist + wheel
        run: pip install build && python -m build

      - name: Check distribution metadata
        run: pip install twine && twine check dist/*

  gate:
    # The constitutional merge gate. This job's check context ("fux gate" —
    # the bare job name, as the check-runs API reports it) is the REQUIRED
    # status check on the protected branch — see
    # .github/branch-protection.json and docs/constitution-enforcement-handoff.md.
    name: fux gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (stdlib-only engine)
        run: pip install -e .

      - name: Seed agent home (schema + bundled rules)
        run: fux setup

      - name: Gate — knowledge must be in sync with code (exit 2 blocks merge)
        run: fux gate

  ai-review:
    # The second-set-of-eyes review (§2R.1). A solo author can't approve his own
    # PR, so the missing human approval is enforced as a CHECK: a separate
    # reviewer identity reviews the PR diff against the constitution and exits
    # non-zero on problems. REFUSES (exit 3) if reviewer == PR author
    # (separation of duties). Required alongside `fux gate` — see
    # .github/branch-protection.json. PRs only (needs an author to check against).
    name: ai-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need base sha to diff the PR

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (stdlib-only engine)
        run: pip install -e .

      - name: Seed agent home (schema + bundled rules)
        run: fux setup

      - name: Constitutional review of the PR diff (separation of duties enforced)
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REVIEWER: fux-ci-reviewer
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: ./scripts/ai-review.sh
