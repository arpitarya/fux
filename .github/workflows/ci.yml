name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install (stdlib-only engine + pytest)
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest -q

      - name: Self-check (dogfood — engine must init/build/check its own project)
        run: |
          fux --version
          fux setup
          mkdir -p /tmp/selfcheck && cd /tmp/selfcheck && git init -q
          fux init
          fux new formula sample --domain demo
          fux build
          fux check

  build-check:
    name: Build & metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist + wheel
        run: pip install build && python -m build

      - name: Check distribution metadata
        run: pip install twine && twine check dist/*
