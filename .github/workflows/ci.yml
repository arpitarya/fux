name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (stdlib-only engine + pytest)
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -q
      - name: Self-check (the engine governs its own knowledge)
        run: |
          fux --version
          # Dogfood: a throwaway project must init/build/check cleanly.
          mkdir -p /tmp/selfcheck && cd /tmp/selfcheck && git init -q
          fux init
          fux new formula sample --domain demo
          fux build
          fux check
