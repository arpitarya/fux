name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Release tag must match the package version
        # Guards the silent-failure mode: an unbumped __version__ would build
        # the previous version and skip-existing would "publish" nothing, green.
        run: |
          pkg="$(python -c "import sys; sys.path.insert(0, 'src'); import fux; print(fux.__version__)")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "✗ release tag v$tag != fux.__version__ $pkg — bump src/fux/__init__.py first" >&2
            exit 1
          fi
          echo "✔ tag v$tag matches __version__ $pkg"

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        run: twine check --strict dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write  # OIDC trusted publishing — only this job needs it
    environment:
      name: pypi
      url: https://pypi.org/project/fux-engine/

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
