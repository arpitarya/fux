name: audit-protection

# Branch protection lives in GitHub, outside the repo — Fux cannot seal it
# (handoff §1). So it is WATCHED: this scheduled audit asserts the required
# checks + enforce_admins are intact and that live protection matches the
# committed .github/branch-protection.json, and FAILS LOUDLY on any drift (§3).
on:
  schedule:
    - cron: "17 9 * * 1"      # 09:17 UTC every Monday
  workflow_dispatch:           # manual run on demand

permissions:
  contents: read               # least privilege; the audit only reads protection

jobs:
  audit-protection:
    name: audit-protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit branch protection vs committed source of truth
        # Reading branch protection needs admin (administration:read); the default
        # GITHUB_TOKEN is not a repo admin and gets 403. Provide an admin-scoped PAT
        # as the BRANCH_PROTECTION_TOKEN secret. The script exits non-zero (not a
        # silent pass) if the token can't read protection, so a missing secret fails
        # the audit loudly rather than hiding drift.
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./scripts/audit-branch-protection.sh "${{ github.repository_owner }}" "${{ github.event.repository.name }}" "${{ github.event.repository.default_branch }}"
